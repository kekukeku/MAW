<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAW Autonomous Workflow Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0b0f19; --panel: #121829; --border: rgba(255,255,255,0.08);
      --accent: #6366f1; --accent2: #4f46e5; --text: #f3f4f6; --muted: #9ca3af;
      --ok: #10b981; --warn: #f59e0b; --err: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .layout { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr auto; gap: 12px; padding: 16px; height: 100vh; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; overflow: auto; }
    .panel h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 12px; }
    .full-width { grid-column: 1 / -1; }
    textarea, select, input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px; font: inherit; }
    textarea { min-height: 100px; resize: vertical; }
    label { display: block; font-size: 12px; color: var(--muted); margin: 8px 0 4px; }
    .btn { padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-danger { background: var(--err); color: #fff; }
    .btn-secondary { background: rgba(255,255,255,0.08); color: var(--text); }
    .model-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; max-height: 120px; overflow: auto; }
    .model-grid label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text); }
    .pipeline { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 12px 0; }
    .node { padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border); font-size: 12px; color: var(--muted); transition: all 0.3s; }
    .node.active { background: rgba(99,102,241,0.2); border-color: var(--accent); color: #fff; animation: pulse 1.5s infinite; }
    .node.done { background: rgba(16,185,129,0.15); border-color: var(--ok); color: var(--ok); }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.4); } 50% { box-shadow: 0 0 12px 4px rgba(99,102,241,0.3); } }
    .arrow { color: var(--muted); }
    #terminal { font-family: 'JetBrains Mono', monospace; font-size: 11px; background: #050810; border-radius: 8px; padding: 12px; height: 200px; overflow-y: auto; white-space: pre-wrap; color: #a5f3fc; }
    .stage-block { margin-top: 10px; border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-size: 13px; }
    .stage-block h3 { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 100; }
    .modal.open { display: flex; }
    .modal-box { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 520px; max-width: 90vw; }
    .modal-box h3 { margin-bottom: 16px; }
    .report-row { display: grid; grid-template-columns: 120px 1fr; gap: 8px; font-size: 13px; margin-bottom: 8px; }
    .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
    .status-running { background: rgba(99,102,241,0.2); color: var(--accent); }
    .status-failed { background: rgba(239,68,68,0.2); color: var(--err); }
    .status-done { background: rgba(16,185,129,0.2); color: var(--ok); }
    .cost-hint { font-size: 12px; padding: 6px 10px; border-radius: 6px; margin-bottom: 8px; }
    .cost-hint.mock { background: rgba(16,185,129,0.1); color: var(--ok); }
    .cost-hint.live { background: rgba(245,158,11,0.1); color: var(--warn); }
    .auto-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-left: 8px; }
    .auto-badge.on { background: rgba(16,185,129,0.15); color: var(--ok); }
    .auto-badge.off { background: rgba(245,158,11,0.15); color: var(--warn); }
    .final-report { background: rgba(16,185,129,0.05); border: 1px solid rgba(16,185,129,0.25); border-radius: 12px; padding: 16px; margin-top: 16px; }
    .final-report h3 { color: var(--ok); }
  </style>
</head>
<body>
  <div class="layout">
    <!-- Panel 1: Council Creation -->
    <div class="panel" id="panel-create">
      <h2>Panel 1 — Council Creation</h2>
      <label>Task Prompt</label>
      <textarea id="prompt" placeholder="Describe what you want the council to plan..."></textarea>
      <label>Target Project</label>
      <select id="target-key"></select>
      <label>Council Members</label>
      <div class="model-grid" id="council-models"></div>
      <label>Chairman Model</label>
      <select id="chairman-model"></select>
      <label>Review Mode</label>
      <select id="review-mode">
        <option value="AI">AI Review</option>
        <option value="Human">Human Review</option>
        <option value="None">None (skip review)</option>
      </select>
      <label>Max AI Review Iterations (0-5)</label>
      <input type="number" id="max-iterations" min="0" max="5" value="3">
      <label><input type="checkbox" id="allow-changes" checked> Allow REQUEST_CHANGES loop</label>
      <label title="Unchecking skips gate #2 only when ALLOW_AUTO_COMMIT=true on server">
        <input type="checkbox" id="require-commit" checked> Require pre-commit approval
        <span id="auto-commit-badge" class="auto-badge off">server off</span>
      </label>
      <label title="When enabled, skips council approval gate (gate #1) automatically">
        <input type="checkbox" id="auto-approve-council"> Auto-approve council plan
      </label>
      <label><input type="checkbox" id="mock-mode"> Use mock council (no API cost)</label>
      <div class="actions">
        <button class="btn btn-primary" onclick="startCouncil()">Start Council</button>
      </div>
      <p id="create-status" style="margin-top:8px;font-size:12px;color:var(--muted)"></p>
      <div id="cost-hint" class="cost-hint" style="display:none"></div>
    </div>

    <!-- Panel 2: Council Result / Final Report -->
    <div class="panel" id="panel-council">
      <h2 id="panel2-title">Panel 2 — Council Result Review</h2>
      <div id="council-results"><p style="color:var(--muted)">Run a council to see results.</p></div>
      <div class="actions" id="council-actions" style="display:none">
        <button class="btn btn-primary" onclick="approveCouncil()">Approve Plan</button>
        <button class="btn btn-danger" onclick="rejectCouncil()">Reject</button>
      </div>
    </div>

    <!-- Panel 3: Workflow Pipeline Tracker -->
    <div class="panel full-width" id="panel-pipeline">
      <h2>Panel 3 — Workflow Pipeline</h2>
      <div class="pipeline" id="pipeline">
        <span class="node" data-state="COUNCIL_RUNNING">Council</span><span class="arrow">→</span>
        <span class="node" data-state="EXPORTED">Export</span><span class="arrow">→</span>
        <span class="node" data-state="EXECUTOR_RUNNING">Executor</span><span class="arrow">→</span>
        <span class="node" data-state="REVIEW_RUNNING">Review</span><span class="arrow">→</span>
        <span class="node" data-state="FIX_LOOP">Fix Loop</span><span class="arrow">→</span>
        <span class="node" data-state="COMMIT_PENDING_APPROVAL">Commit Approval</span><span class="arrow">→</span>
        <span class="node" data-state="COMPLETED">Done</span>
      </div>
      <p>State: <span id="workflow-state" class="status-badge status-running">IDLE</span>
         Task: <span id="task-num">—</span></p>
      <div class="actions" id="human-review-actions" style="display:none">
        <span style="font-size:12px;color:var(--muted);margin-right:8px;">Human review:</span>
        <button class="btn btn-primary" onclick="submitHumanReview('APPROVE')">Approve</button>
        <button class="btn btn-secondary" onclick="submitHumanReview('REQUEST_CHANGES')">Request Changes</button>
        <button class="btn btn-danger" onclick="submitHumanReview('REJECT')">Reject</button>
      </div>
    </div>

    <!-- Panel 4: Real-Time Log Terminal -->
    <div class="panel full-width" id="panel-logs">
      <h2>Panel 4 — Real-Time Logs</h2>
      <div id="terminal"></div>
    </div>
  </div>

  <!-- Panel 5: Pre-Commit Report Modal -->
  <div class="modal" id="commit-modal">
    <div class="modal-box">
      <h3>Panel 5 — Pre-Commit Report</h3>
      <div id="commit-report"></div>
      <div class="actions">
        <button class="btn btn-primary" onclick="approveCommit()">Approve Commit</button>
        <button class="btn btn-secondary" onclick="requestChanges()">Request Changes</button>
        <button class="btn btn-danger" onclick="cancelWorkflow()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let config = {}, targets = [], activeConversationId = null, activeTaskNum = null;
    let activeWorkflowId = null, ws = null, lastLogCount = 0, currentWorkflow = null;

    const STATE_MAP = {
      IDLE: 'COUNCIL_RUNNING', COUNCIL_RUNNING: 'COUNCIL_RUNNING',
      COUNCIL_PENDING_APPROVAL: 'COUNCIL_RUNNING',
      EXPORTED: 'EXPORTED', EXECUTOR_RUNNING: 'EXECUTOR_RUNNING',
      REVIEW_PENDING: 'REVIEW_RUNNING', REVIEW_RUNNING: 'REVIEW_RUNNING',
      REVIEW_DECISION_PENDING: 'REVIEW_RUNNING',
      COMMIT_PENDING_APPROVAL: 'COMMIT_PENDING_APPROVAL', COMMITTING: 'COMMIT_PENDING_APPROVAL',
      COMPLETED: 'COMPLETED', FINAL_REPORT_PRESENTED: 'COMPLETED',
    };

    async function init() {
      const [cfgRes, tgtRes] = await Promise.all([
        fetch(`${API}/api/maw/config`), fetch(`${API}/api/maw/targets`)
      ]);
      config = await cfgRes.json();
      const tgtData = await tgtRes.json();
      targets = tgtData.projects;
      renderModels();
      renderTargets();
      document.getElementById('mock-mode').checked = !!config.mockMode;
      renderAutoCommitBadge();
      updateCostHint();
    }

    function renderAutoCommitBadge() {
      const badge = document.getElementById('auto-commit-badge');
      if (config.allowAutoCommit) {
        badge.className = 'auto-badge on';
        badge.textContent = '\u2714 server on';
      } else {
        badge.className = 'auto-badge off';
        badge.textContent = '\u26a0 server off';
      }
    }

    function renderModels() {
      const grid = document.getElementById('council-models');
      const chair = document.getElementById('chairman-model');
      grid.innerHTML = '';
      chair.innerHTML = '';
      (config.availableModels || []).forEach(m => {
        const checked = (config.defaultCouncilModels || []).includes(m) ? 'checked' : '';
        grid.innerHTML += `<label><input type="checkbox" value="${m}" ${checked}> ${m.split('/').pop()}</label>`;
        chair.innerHTML += `<option value="${m}" ${m === config.defaultChairmanModel ? 'selected' : ''}>${m}</option>`;
      });
    }

    function renderTargets() {
      const sel = document.getElementById('target-key');
      sel.innerHTML = targets.map(t => `<option value="${t.key}" ${!t.valid ? 'disabled' : ''}>${t.name}${t.valid ? '' : ' (invalid)'}</option>`).join('');
    }

    function selectedModels() {
      return [...document.querySelectorAll('#council-models input:checked')].map(c => c.value);
    }

    function updateCostHint() {
      const hint = document.getElementById('cost-hint');
      const isMock = document.getElementById('mock-mode').checked;
      const councilCount = selectedModels().length;
      if (isMock) {
        hint.className = 'cost-hint mock';
        hint.textContent = `\u{1F9EA} Mock mode — no API calls (simulates ${councilCount} members + 1 chairman)`;
      } else {
        hint.className = 'cost-hint live';
        hint.textContent = `\u{1F4B0} Live mode — will call ${councilCount} council members + 1 chairman via OpenRouter`;
      }
      hint.style.display = 'block';
    }

    // Update cost hint whenever models or mock toggle change
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        document.getElementById('mock-mode').addEventListener('change', updateCostHint);
        document.getElementById('council-models').addEventListener('change', updateCostHint);
      }, 100);
    });

    async function startCouncil() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) return alert('Enter a prompt');
      document.getElementById('create-status').textContent = 'Council running...';
      const body = {
        prompt, targetKey: document.getElementById('target-key').value,
        councilModels: selectedModels(),
        chairmanModel: document.getElementById('chairman-model').value,
        reviewPolicy: {
          mode: document.getElementById('review-mode').value,
          max_iterations: parseInt(document.getElementById('max-iterations').value),
          allow_request_changes: document.getElementById('allow-changes').checked,
          require_pre_commit_approval: document.getElementById('require-commit').checked,
          auto_approve_council: document.getElementById('auto-approve-council').checked,
        },
      };
      if (document.getElementById('mock-mode').checked) body.mock = true;
      const res = await fetch(`${API}/api/maw/conversations/new`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        document.getElementById('create-status').textContent = 'Failed: ' + (err.detail || res.status);
        return;
      }
      const started = await res.json();
      activeWorkflowId = started.workflow_id;
      pollForCouncil();
    }

    async function pollForCouncil() {
      for (let i = 0; i < 60; i++) {
        await new Promise(r => setTimeout(r, 1000));
        const res = await fetch(`${API}/api/maw/workflows/${activeWorkflowId}`);
        if (!res.ok) continue;
        const wf = await res.json();
        // If auto-approve kicked in, workflow may already have a task_num
        if (wf.task_num) {
          activeTaskNum = wf.task_num;
          document.getElementById('task-num').textContent = activeTaskNum;
          lastLogCount = 0;
          document.getElementById('terminal').textContent = '';
          connectWebSocket(activeTaskNum);
          pollWorkflow();
          return;
        }
        if (wf.state === 'COUNCIL_PENDING_APPROVAL' && wf.conversation_id) {
          activeConversationId = wf.conversation_id;
          document.getElementById('create-status').textContent = 'Council complete — review results';
          await loadCouncilResults();
          return;
        }
        if (wf.state === 'FAILED') {
          document.getElementById('create-status').textContent = 'Council failed: ' + (wf.reason || '');
          return;
        }
      }
    }

    async function loadCouncilResults() {
      const res = await fetch(`${API}/api/maw/conversations/${activeConversationId}`);
      const data = await res.json();
      const conv = data.conversation;
      const msg = conv.messages.find(m => m.stage3);
      if (!msg) return;
      document.getElementById('panel2-title').textContent = 'Panel 2 — Council Result Review';
      let html = '';
      if (msg.stage1) {
        html += '<div class="stage-block"><h3>Stage 1 — Individual Answers</h3>';
        msg.stage1.forEach(s => { html += `<p><strong>${s.model}</strong></p><div>${marked.parse(s.response)}</div>`; });
        html += '</div>';
      }
      if (msg.stage2) {
        html += '<div class="stage-block"><h3>Stage 2 — Anonymous Rankings</h3>';
        msg.stage2.forEach((s, i) => {
          html += `<p><strong>Evaluator ${i + 1}</strong></p><div>${marked.parse(s.ranking)}</div>`;
        });
        html += '</div>';
      }
      html += `<div class="stage-block"><h3>Stage 3 — Chairman Synthesis</h3><div>${marked.parse(msg.stage3.response)}</div></div>`;
      document.getElementById('council-results').innerHTML = html;
      document.getElementById('council-actions').style.display = 'flex';
      updatePipeline({ state: 'COUNCIL_PENDING_APPROVAL', review_iterations: 0 });
    }

    async function approveCouncil() {
      const res = await fetch(`${API}/api/maw/conversations/${activeConversationId}/approve`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
      const wf = await res.json();
      activeTaskNum = wf.task_num;
      lastLogCount = 0;
      document.getElementById('terminal').textContent = '';
      document.getElementById('task-num').textContent = activeTaskNum;
      document.getElementById('council-actions').style.display = 'none';
      connectWebSocket(activeTaskNum);
      pollWorkflow();
    }

    async function rejectCouncil() {
      await fetch(`${API}/api/maw/conversations/${activeConversationId}/reject`, { method: 'POST' });
      document.getElementById('council-actions').style.display = 'none';
      updatePipeline({ state: 'FAILED', review_iterations: 0 });
    }

    function connectWebSocket(taskNum) {
      if (ws) ws.close();
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws/workflow/${taskNum}`);
      ws.onmessage = (ev) => {
        const data = JSON.parse(ev.data);
        if (data.type === 'log') appendLog(data.entry);
        if (data.workflow) updateFromWorkflow(data.workflow);
      };
    }

    function appendLog(entry) {
      const term = document.getElementById('terminal');
      const prefix = entry.stream === 'stderr' ? '[ERR] ' : entry.stream === 'git' ? '[GIT] ' : '';
      term.textContent += `${entry.ts} ${prefix}${entry.line}\n`;
      term.scrollTop = term.scrollHeight;
    }

    async function pollWorkflow() {
      if (!activeTaskNum) return;
      for (let i = 0; i < 120; i++) {
        await new Promise(r => setTimeout(r, 1000));
        const res = await fetch(`${API}/api/maw/workflow/${activeTaskNum}/status`);
        if (!res.ok) continue;
        const wf = await res.json();
        updateFromWorkflow(wf);
        if (wf.state === 'COMMIT_PENDING_APPROVAL') { showCommitModal(wf); return; }
        if (wf.state === 'FINAL_REPORT_PRESENTED') { showFinalReport(wf); return; }
        if (wf.state === 'FAILED') return;
      }
    }

    function updateFromWorkflow(wf) {
      currentWorkflow = wf;
      updatePipeline(wf);
      document.getElementById('workflow-state').textContent = wf.state;
      const logs = wf.logs || [];
      for (let i = lastLogCount; i < logs.length; i++) appendLog(logs[i]);
      lastLogCount = logs.length;
      const humanPanel = document.getElementById('human-review-actions');
      humanPanel.style.display = (wf.state === 'REVIEW_PENDING' && wf.review_policy?.mode === 'Human') ? 'flex' : 'none';
    }

    function updatePipeline(wf) {
      const state = wf.state;
      const mapped = STATE_MAP[state] || state;
      const order = ['COUNCIL_RUNNING','EXPORTED','EXECUTOR_RUNNING','REVIEW_RUNNING','FIX_LOOP','COMMIT_PENDING_APPROVAL','COMPLETED'];
      let idx = order.indexOf(mapped);
      if (wf.review_iterations > 0 && ['EXECUTOR_RUNNING','REVIEW_RUNNING','REVIEW_PENDING'].includes(state)) {
        idx = Math.max(idx, order.indexOf('FIX_LOOP'));
      }
      document.querySelectorAll('#pipeline .node').forEach(node => {
        const ns = node.dataset.state;
        const ni = order.indexOf(ns);
        node.classList.remove('active','done');
        if (ni < idx) node.classList.add('done');
        else if (ni === idx) node.classList.add('active');
        if (ns === 'FIX_LOOP' && wf.review_iterations > 0 && ['EXECUTOR_RUNNING','REVIEW_RUNNING','REVIEW_PENDING'].includes(state)) {
          node.classList.add('active');
        }
      });
    }

    async function submitHumanReview(decision) {
      if (!activeTaskNum) return;
      await fetch(`${API}/api/maw/workflow/${activeTaskNum}/human-review-complete`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ decision }),
      });
      pollWorkflow();
    }

    function showFinalReport(wf) {
      const r = wf.final_report || {};
      document.getElementById('panel2-title').textContent = 'Panel 2 — Final Report';
      document.getElementById('council-actions').style.display = 'none';
      document.getElementById('council-results').innerHTML = `
        <div class="final-report">
          <h3>\u2705 Task Complete: ${r.task_id || ''}</h3>
          <div class="report-row"><span>Title</span><span>${r.title || ''}</span></div>
          <div class="report-row"><span>Files Changed</span><span>${r.files_changed || ''}</span></div>
          <div class="report-row"><span>Review Decision</span><span>${r.review_decision || ''} (${r.review_iterations || 0} loops)</span></div>
          <div class="report-row"><span>Committed At</span><span>${r.committed_at || ''}</span></div>
          <div style="margin-top:12px;font-style:italic;color:var(--muted);">${marked.parse(r.chairman_summary || '')}</div>
        </div>`;
      document.getElementById('workflow-state').className = 'status-badge status-done';
      document.getElementById('workflow-state').textContent = wf.state;
    }

    function showCommitModal(wf) {
      const r = wf.pre_commit_report || {};
      document.getElementById('commit-report').innerHTML = `
        <div class="report-row"><span>Task ID</span><span>${r.task_id || ''}</span></div>
        <div class="report-row"><span>Title</span><span>${r.title || ''}</span></div>
        <div class="report-row"><span>Files Changed</span><span>${r.files_changed || ''}</span></div>
        <div class="report-row"><span>Review Decision</span><span>${r.review_decision || ''} (${r.review_iterations || 0} loops)</span></div>
        <div class="report-row"><span>Summary</span><span>${(r.chairman_summary || '').slice(0,200)}</span></div>`;
      document.getElementById('commit-modal').classList.add('open');
    }

    async function approveCommit() {
      await fetch(`${API}/api/maw/workflow/${activeTaskNum}/approve-commit`, { method: 'POST' });
      document.getElementById('commit-modal').classList.remove('open');
      updatePipeline({ state: 'COMPLETED', review_iterations: currentWorkflow?.review_iterations || 0 });
      pollWorkflow();
    }
    async function requestChanges() {
      await fetch(`${API}/api/maw/workflow/${activeTaskNum}/request-changes`, { method: 'POST' });
      document.getElementById('commit-modal').classList.remove('open');
      pollWorkflow();
    }
    async function cancelWorkflow() {
      await fetch(`${API}/api/maw/workflow/${activeTaskNum}/cancel`, { method: 'POST' });
      document.getElementById('commit-modal').classList.remove('open');
      updatePipeline({ state: 'FAILED', review_iterations: 0 });
    }

    init();
  </script>
</body>
</html>
